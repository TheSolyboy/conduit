<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>Conduit</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="hdr">
      <div class="hdr-left">
        <span class="wordmark">CONDUIT</span>
        <span class="hdr-divider"></span>
        <span class="status-dot" id="status-dot" data-state="connecting"></span>
        <span class="status-text" id="status-text">connecting</span>
      </div>
      <nav class="hdr-nav">
        <a href="#/" class="nav-link" data-route="dashboard">DASHBOARD</a>
        <a href="#/settings" class="nav-link" data-route="settings">SETTINGS</a>
      </nav>
    </header>

    <div class="banner" id="banner" hidden></div>

    <main class="view" id="view-dashboard">
      <div class="col-groups">
        <div class="cg cg-port">PORT</div>
        <div class="cg cg-traffic">TRAFFIC</div>
        <div class="cg cg-rate">RATE</div>
        <div class="cg cg-meta">META</div>
      </div>
      <div class="col-heads">
        <div class="ch ch-dot"></div>
        <div class="ch ch-portnum">#</div>
        <div class="ch ch-name">NAME</div>
        <div class="ch ch-spark">PACKETS · last 60</div>
        <div class="ch ch-in">IN<span class="ch-sub">·avg30</span></div>
        <div class="ch ch-out">OUT<span class="ch-sub">·avg30</span></div>
        <div class="ch ch-rps">REQ/S</div>
        <div class="ch ch-src">TOP SOURCE</div>
        <div class="ch ch-total">TOTAL</div>
        <div class="ch ch-seen">LAST SEEN</div>
      </div>
      <div class="rows" id="rows"></div>
      <div class="empty" id="empty" hidden>
        <span>No ports monitored yet.</span>
        <a href="#/settings">Configure in settings →</a>
      </div>
    </main>

    <main class="view" id="view-settings" hidden>
      <section class="panel">
        <h2 class="panel-title">MONITORED PORTS</h2>
        <div class="setlist" id="setlist"></div>

        <form class="add-form" id="add-form">
          <input type="number" id="add-port" placeholder="port"  min="1" max="65535" required />
          <input type="text"   id="add-name" placeholder="display name" maxlength="40" required />
          <button type="submit" class="btn-ghost">ADD</button>
        </form>
      </section>

      <section class="panel">
        <h2 class="panel-title">DASHBOARD</h2>
        <div class="setrow setrow-static">
          <label class="setrow-label" for="dash-port">listen port</label>
          <input type="number" id="dash-port" min="1" max="65535" />
          <span class="hint">requires restart</span>
        </div>
        <div class="setrow setrow-static">
          <label class="setrow-label" for="iface">capture interface</label>
          <input type="text" id="iface" placeholder="auto" />
          <span class="hint">blank = auto-detect, requires restart</span>
        </div>
        <div class="actions">
          <button type="button" class="btn-primary" id="save-dash">SAVE</button>
          <span class="actions-hint" id="save-hint"></span>
        </div>
      </section>
    </main>

    <footer class="ftr">
      <span class="ftr-meta" id="ftr-meta">—</span>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
